name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: SIKRET

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -r auth-service/requirements.txt
          pip install -r post-service/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          # Run auth-service tests
          PYTHONPATH=auth-service:$PYTHONPATH pytest auth-service/tests/
          
          # Run post-service tests
          PYTHONPATH=post-service:$PYTHONPATH pytest post-service/tests/
          
          # Run end-to-end tests with access to both services
          PYTHONPATH=auth-service:post-service:$PYTHONPATH pytest tests_e2e/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: spluthietaco
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: spluthietaco/auth-service:latest

      - name: Build and push post-service
        uses: docker/build-push-action@v5
        with:
          context: ./post-service
          push: true
          tags: spluthietaco/post-service:latest
